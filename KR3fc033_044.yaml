body:
  text: 三萬三千平亷一十三億一千三百以前啇二百九二三自乘得四億三三十一萬五千七百千七百七十七萬一千九百二十九爲八十七平廉面三倍之得一十三億一千三百三長亷六萬二千七百六十十一萬五千七百八十七爲平廉法取一九三一三三一五七八七籌列立方籌左自乘數九十以前啇二百九二三三倍之得六萬二千七百六十九爲長廉法取六二七六九籌列立方籌右次于列籌并數取其近少于餘實者至第三格遇三九三九九四七三六一二七爲約數另列之次向右三格內自乘數取九十乘長廉法得五百六十四萬九千二百一十并得三千九百四十五億五千九百六十五萬不盡細分二十三億七千一百二十七除實未盡得立方根六千九百八十七萬二百九又一千分分之二百三十三五千八百七十三是餘實爲無方之根開之終莫能盡
