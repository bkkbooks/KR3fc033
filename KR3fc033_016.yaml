body:
  text: 長亷七百八十以初次兩啇二百六十三倍之得七百八自乘數四十九十為長廉法取七八號籌列立方籌右次于列籌內并數取其近少于餘實者至第七格遇一百四十一萬九千九百四十三為約數另列之次向右七格內自乘數四十九乘長廉法七百八十得一萬八千二百二十並得約數共一百四十五萬八千一百六十三除實恰盡總得方根二百六十七三啇八位例積實三千百三十七萬置實初啇起十位在實前隔一位加三一千三百二十八算除實二千七百萬置方根三百為初啇餘實二百三十七萬一千次用初啇三百自乘得九萬為平廉面三百二十八三倍之得二十七萬為平廉法取二七平亷二十七萬號籌列立方籌左長亷九百以初啇三百三倍之得九百為長廉法自乘數一百取九號籌列立方籌右
