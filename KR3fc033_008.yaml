body:
  text: 合而大無不同者初啇認單數十數百數定方根次啇以平廉籌數取平廉實卽于立方籌數取立隅積又以平方籌自乘數取長廉兩端之面以長廉兩端面乘長廉法取長廉積諸籌之上一一分明二啇四位例積實六千八百五十九置實初啇起單位在實前隔二位上加一算于立方籌一格內除實一千置方根一十爲初啇餘實五千八百五十九次用初啇一十自乘得一百三倍之得平亷三百三百爲平廉法取三號籌列立方籌左長亷三十以初啇一十三倍之得三十爲長廉法自乘數八十一是爲三長廉一端之面取三號籌列立方籌右次于列籌立方平廉內并數取其近少于餘實者不得過多不得過少爲尙有長廉之容故也至第九格遇三千四百二十九爲約數合平廉籌二千七百立隅七百二十九之數另列之次向右平籌自乘數取八十一乘長廉
  hash: sha256:3df62438cd1ab91b70f2c4e5f74145bf516d89367cb0d4c396363cd26146e8b7
