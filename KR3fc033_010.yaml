body:
  text: 法三十得二千四百三十是爲三長廉全體并得約數共五千八百五十九除實恰盡得立方根一十九二啇五位例積實九萬一千一百二十五置實初啇起十位在實前隔一位上加五四算于立方籌四格內除實六萬四千置方根四十爲初啇餘實二萬七千一百二十次用初啇四十自乘得一千六百爲平五廉面三倍之得四千八百爲平廉法取平亷四千八百四八號籌列立方籌左長亷一百二十以初啇四十三倍之得一百二十爲長自乘數二十五廉法取一二號籌列立方籌右次于列籌內并數取其近少于餘實者至第五格遇二萬四千一百二十五爲約數另列之次向右五格自乘數取二十五乘長廉法一百二十得三千并得約數共二萬七千一百二十五除實恰盡得立方根
  hash: sha256:0d428b19f554f9b838eaa27c06061e782f51e17ef0d315b5e02403b073b53b07
