body:
  text: 九千八百四十六萬除實六百四十億置方根四千為初一千四百二十九啇餘實五百四十二億九千次用初啇四千自乘得一千六百萬為八百四十六萬一千平廉面三倍之得四千八百萬為平廉四百二十九法取四八號籌列立方籌左平亷四千八百萬以初啇四千三倍之得一萬二千為長長亷一萬二千廉法取一二號籌列立方籌右自乘數八十一萬次于列籌內并數取其近少于餘實者至第九格遇四百三十九億二千九百萬為約數另列之次向右九格自乘數取八十一萬乘長廉法一萬二千得九十七億二千萬并得約數共五百三十六億四千九百萬除餘實為二啇九百餘實六億四千九百四十次用初二啇四千九百自乘得二千四六萬一千四百二十百一萬為平廉面三倍之得七千二四百二十九百三萬為平廉法取七二三號籌
