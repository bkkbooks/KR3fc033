body:
  text: 五開以上從此進之然數至億億不知所用矣立方籌左二行在初啇為方根在次啇以上為立隅其理數可與前平方籌通推之但平方一乘作面為法簡立方一乘作面再乘作體為法繁平方為面面有四線開得四線之一為方根立方為體體有十二線開得十二線之一為方根三乘方以上亦皆十二線有等有不等而皆求其最初第一面之第一界線為方根自乘再乘止于三位如三自乘再乘為二十七九自乘再乘為七百二十九故列實從實尾起隔二位作一開見積實便知有幾啇也平廉法以方根自乘三倍之一格至九格則止更有以上數則此開位之所不及者以聽再開多開以上同此平廉列籌數每多于立隅無小于立隅之數方籌立隅數每小于平廉無大于平廉之數而列籌末位與立隅首位位數每同亦一奇也平廉籌列立方籌之左者立方籌右行為單數中行為十數左行為百數平廉右行之位亦百數也以合于立方籌之左行共為幾百也此在末啇則然若啇位多則兩籌相
