body:
  text: 二啇平廉之長六千自乘得三千六百萬是一個平廉面以三千六百萬二啇三百乘之得一百八億為一個平廉體三個平廉體是為三百二十四億立隅之長三百自乘之得九百為立隅而再乘之得二千七百萬為立隅體二啇長廉之長六千是一個長廉之長以六千二啇三百乘之得一百八十萬為長廉之面以一百八十萬二啇三百再乘之得五億四千萬為一個長廉之體三個長廉體是為一十六億二十萬餘實八億三千四百四十三啇平廉之長六千三百自乘得三千一萬六千四百四十九百六十九萬是一個平廉面三平廉三是為一億一十九百七萬視十前又有空作知三啇十餘實同上四以四啇六千三百十自乘得三千平亷一億一千九百七九百六十九萬千百為平廉面三萬十百倍之得一億一千九百七萬千
