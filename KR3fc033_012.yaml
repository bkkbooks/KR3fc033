body:
  text: 二商六位例積實五十九萬二千七百置實初啇起百位在實前隔一位上加四八算于立方籌八格內除實五十一萬二千置方根八十爲初啇餘實八萬七百四次用初啇八十自乘得六千四百三倍之得一萬九千二百爲平廉法取一九平亷一萬九千二百二號籌列立方籌左長亷二百四十以初啇八十三倍之得二百四十爲長自乘數一十六廉法取二四號籌列立方籌右次于列籌內并數取其近少于餘實者至第四格遇七萬六千八百六十四爲約數另列之次向右四格自乘數取一十六乘長廉法二百四十得三千八百四十并得約數共八萬七百四除實恰盡得立方根八十四三啇七位例雖是八位然在立方籌十數之下退入于二格單位仍作七位算
