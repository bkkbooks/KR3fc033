body:
  text: 平亷一千三百一十二萬以前啇二百九二自乘得四百三十九千三百九十二七萬六千四百六十四爲平廉面三倍長亷六千二百七十六之得一千三百一十二萬九千三百九自乘數九十十二爲平廉法取一三一二九三九二籌列立方籌左以前啇二百九二三倍之得六千二百七十六爲長廉法此因餘分升位得數取六二七六籌列立方籌右次于列籌并數取其近少于餘實者至第三格遇三九三八八一七六二七爲約數另列之次向右三格內自乘數取九十乘長廉法得五十六萬四千八百四十并得三十九億三千九百三十八萬二千四百六十七除實未盡得立方根二百九又一百分分之二十三餘實三億九千六百九十此五開不成方之餘實也更加三空得二萬九千五百三十三千九百六十九億二千九百五十三
  hash: sha256:cd335dd899868599ee933a77b9f0e2fee1762a719cf3dfc99e01a2161902e0b2
