body:
  text: 為八億三千三百四十九萬立隅之長七數自乘之得四十九為立隅面再乘之得三百四十三為立隅體四啇長廉之長六千三百十是一個長廉之長以六千三百十四啇七數乘之得四萬四千一百為長廉之面以四萬四千一百四啇七數再乘之得三十萬八千七百為一個長廉之體三個長廉體是為九十二萬六千一百三啇七位例除命分法積實九百一十五萬九千置實初啇起單位在實前二位上加二八百九十九算于立方籌二格內除實八百萬餘實一百一十五萬九千置方根二百為初啇八百九十九次用初啇二百自乘得四萬為平廉面平亷一十二萬三倍之得一十二萬為平廉法取一二號籌列立方籌左以初啇二百三倍之得六百為長廉法取六號籌列立方籌右
  hash: sha256:d630da340e70e19cd5f1a0336aecbe4b15c42e20ee188dd17a2992af9700b89a
