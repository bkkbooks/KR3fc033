body:
  text: 列于後平立方俱可通用餘實更加三空得餘分三千五十七萬以前啇二百九自乘爲平廉面四萬三六八一三倍之得一十三萬一四三爲平廉法取一三一四三籌列立方籌左長亷六百二十七以前啇二百九三倍之得六百二七自乘數四十爲長廉法取六二七籌列立方籌右次于列籌內并數取其近少于餘實者至第二格遇二六二八六八爲約數另列之次向右二格內自乘數取四十乘長廉法六百二七得二萬五千八十并約數得一千六百二十三萬三六八八除實未盡得立方根二百九又一十分分之二餘實四百三十三萬六千此四開不成方之餘實也更加三空得三百一十二四十三億三千六百三十一萬二千
