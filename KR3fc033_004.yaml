body:
  text: 也次啇又有長廉法依平廉之旁故曰廉同方根之長故曰長其兩端為自乘方以初啇數三倍之長廉三倍之高廣因三平廉之長以補三平廉之闕如三則三倍為九五則五倍為十五是也以平廉法數取其籌列立方籌左又以長廉法數取其籌列立方籌右次視左籌與方籌橫并之數啇其少于餘實者平行取數為約數另置之即以此格數為次啇在二格即為次啇二在五格即為次啇五是也又取次啇自乘之數與長廉法數相乘併于約數之內除其餘實即為次啇取用之法不言立隅法者次啇之再乘即立隅籌上所自有也三開四開以上從此推之開而不盡者以法命之算立方在長廉自乘數最不易定西人于此立進一位法乃每有不必進位者又有進二位者是立法不純也今去其法要在認位定數
