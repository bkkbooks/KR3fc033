body:
  text: 視列籌內一數至九數皆多于餘實則知啇有空位也置次啇方根二百餘實一百一十五萬九千再以初次兩啇二百十自乘得四萬八百九十九千百爲平廉面三倍之得一十二平亷一十二萬萬千百爲平廉法取一二號長亷六百籌列立方籌左自乘數八十一以初次兩啇二百十三倍之得六百十爲長廉法取六籌列立方籌右次于列籌內并數取其近少于餘實者至第九格遇一百八萬七二九爲約數另列之次向右九格內自乘數八十一乘長廉法六百十得四萬八千六百十并約數得一百一十二萬九三二九除餘實置三啇方根二百九餘實三萬五七此三開不成方之餘實也欲求細分以平亷一十三萬一千四前開平方下命分第一法求之卽將細十三分之大略更求其細又有命分第二法
  hash: sha256:7eb9ab280bc46d63894a68a64474a922ecb32bf14cb546118576d0d2783ea709
