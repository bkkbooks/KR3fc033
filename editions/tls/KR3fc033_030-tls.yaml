body:
  text: 四啇十二位例積實二千五百八億八置實初啇起百位在實前隔一位上加千一百四十一萬六六算除實二千一百六十億置方根六千四百四十三千爲初啇初啇六千自乘得三千六百萬再乘得二千一百六十億爲方根體餘實三百四十八億八千次用初啇六千自乘得三千六百萬爲一百四十一萬六千平廉面三倍之得一億八百萬爲平三百四十三廉法取一八號籌列立方籌左平亷一億八百萬以初啇六千三倍之得一萬八千爲長長亷一萬八千廉法取二八號籌列立方籌右自乘數九萬次于列籌內并數取其近少于餘實者至第三格遇三百二十四億二千七百萬爲約數另列之次向右三格自乘數取九萬乘長廉法一萬八千得一十六億二十萬并得約數共三百四十億四千七百萬餘實爲二啇三百
