body:
  text: 四百五十七萬一千除餘實爲二啇一十餘實一千七百五十二萬再以初次兩啇九百一十自乘得八十四千二百一十三二萬八千一百爲平廉面三倍之得一平亷二百四十八萬四千百四十八萬四千三百爲平廉法取二三百四八四三號籌列立方籌左長亷二千七百三十以初次兩啇九百一十三倍之得二千自乘數四十九七百三十爲長廉法取二七三號籌列立方籌右次于列籌內并數取其近少于餘實者至第七格遇一千七百三十九萬四百四十三爲約數另列之次向右平籌自乘數取四十九乘長廉法二千七百三十得一十三萬三千七百七十并初數共一千七百五十二萬四千二百一十三除實恰盡總得立方根九百一十七四啇十二位例積實一千一百八十二億置實初商起十位在實前位上加四算
  hash: sha256:0eca82b82ca7ea7644c2752c78ac895003778baee6721ff99e9e8d904c1fddba
