body:
  text: 總得方根三百一十二三啇九位例積實七億七千一百九置實初啇起百位在實前隔一位加九萬五十二百一十三算除實七億二千九百萬置方根九百爲初啇立方籌百位之左雖無空位初啇實前必欲空一位下算者以次啇兩廉有進位故留空以待次啇下算與平方之例同然則何不方籌前立一空位以便初啇下算乎曰若然則單位十位又多一空而于次啇平廉立偶不相聯合矣于平方也亦然餘實四千二百九萬五次用初啇九百自乘得八十一萬爲平千二百一十三廉面三倍之得二百四十三萬爲平廉平亷二百四十三萬法取二四三號籌列立方籌左長亷二千七百以初啇九百三倍之得二千七百爲長自乘數一百廉法取二七號籌列立方籌右次于列籌內并數取其近少于餘實者在第一格遇二千四百二十萬一千爲約數另列之次向右一格自乘數一百乘長廉法二千七百得二十七萬并得約數共二千
