body:
  text: 視列籌內一數至九數皆多于餘實又下方根有空位列籌之前無空位則知三啇是空位也置三啇方根十餘實同上再用初二三啇四千九百十自乘得二平亷七千二百三萬千四百一萬千百為平廉面三倍之得七千二百三萬千百為平廉長亷一萬四千七百法取七二三號籌列立方籌左自乘數八十一以初二三啇四千九百十三倍之得一萬四千七百十為長籌法取一四七籌列立方籌右次于列籌并數取其近少于餘實者至第九格遇六億四千八百二十七萬七百二十九為約數另列之次向右九格自乘數取八十一乘長廉法一萬四千七百十得一百一十九萬七百并得約數共六億四千九百四十六萬一千四百二十九除實恰盡總得立方根四千九百九
  hash: sha256:a5a746fb041d615b2683623c20d4cabe6492952e9807dfbfd5be8489d7415c68
