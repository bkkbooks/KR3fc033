body:
  text: 長亷一萬八千九百十百為平廉法取一一九七號籌自乘數四十九列立方籌左以三啇六千三百十三倍之得一萬八千九百十為長廉法取一八九號籌列立方籌右次于列籌內并數取其近少于餘實耆至第七格遇八億三千五百四十九萬三百四十三另列之次向右七格自乘數取四十九乘長廉法一萬八千九百得九十二萬六千一百并得約數共八億三千四百四十一萬六千四百四十三除實盡總得立方根六千三百七四啇平廉之長六千三百十自乘得三千九百六十九萬千百是一個平廉面以三千九百六十九萬十百四啇七數乘之得二億七千七百八十三萬為一個平廉體三個平廉體是
  hash: sha256:e44a1e5e6cd84a46d4dc3519324f335104117eefd58696bdbea098c5bef400e9
