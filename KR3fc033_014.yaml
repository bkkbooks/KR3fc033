body:
  text: 積實一千九百三萬四置實初啇起單位在實前隔一位上加千一百六十三二算除實八百萬置方根二百為初啇餘實一千一百三萬四次用初啇二百自乘得四萬為平廉面千一百六十三三倍之得一十二萬為平廉法取一二平亷一十二萬號籌列立方籌左長亷六百以初啇二百三倍之得六百為長廉法自乘數三千六百取六號籌列立方籌右次于列籌內并數取其近少于餘實者至第六格遇七百四十一萬六千為約數另列之次向右六格自乘數取三千六百乘長廉法六百得二百一十六萬并得約數共九百五十七萬六千除餘實為二啇六十餘實一百四十五萬八千再以初次兩啇二百六十自乘得六萬一百六十三七千六百為平廉面三倍之得二十萬二千八百為平廉法取二二八號平亷二十萬二千八百籌列立方籌左
  hash: sha256:f631d31b32355538ed66a273f25cd5167039a769723e21c310cd9ac6378acafb
