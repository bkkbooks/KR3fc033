body:
  text: 開立方者卽一數自乘再乘之所積以六方面總爲一實體也其散積無故以積求形必用方法平廉法長廉法立隅法啇除之立方籌右行爲一爲四至八一者自乘數也左二行爲一爲八以至七二九者再乘數也積數從實尾起算每三位作一開以自乘再乘每有三位故也在四位五位六位者有兩開七位八位九位者有三開十位十一位十二位者有四開以上從此推之但實在四立七位十位乘數于零數一格之一二格之八是也初啇郎于此兩格內取實首在五位八位十一位者再乘數當有十數三格之二七四格之六四是也初啇卽于此兩格內取實首在六位九位十二位者再乘數當有百數五格之一二五以至九格之七二九是也初啇卽于此五格內取所謂方法用之于初啇者也其次啇有平廉法依方根之旁故曰廉同方根之面故曰平以初啇方法數自乘之自乘爲平廉之面又三倍之三倍爲三平廉之面如初啇在二格自乘爲四三倍之爲一十二初啇在四格自乘爲十六三倍之爲四十八是
