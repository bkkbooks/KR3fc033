body:
  text: 次于列籌內并數取其近少于餘實者在第一格遇二百七十萬一千為約數另列之次向右一格內自乘數一百乘長廉法九百得九萬並得約數共二百七十九萬一千除餘實為二啇一十餘實五十八萬千三百再以初次兩啇三百一十自乘得九萬二十八六千一百為平廉面三倍之得二十八萬八千三百為平廉法取二八八三號籌列立方籌左平亷二十八萬八千三百以初次兩啇三百一十三倍之得九百三長亷九百三十十為長廉法取九三號籌列立方籌右自乘數四次于列籌內并數取其近少于餘實者至第二格遇五十七萬六千六百八為約數另列之次向右一格內自乘數四乘長廉法九百三十得三千七百二十並得約數共五十八萬千三百二十八除實恰盡
